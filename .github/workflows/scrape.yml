name: Scrape feeds

on:
  schedule:
    - cron: "17 */3 * * *"   # every 3h (offset minute; matches the tightest source cadence)
  workflow_dispatch:
    inputs:
      probe:
        description: "Force a from-scratch scrape into a throwaway dir (no commit) — tests that runner IPs can reach the sources"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Scrape and write feeds into docs/
        env:
          # Probe mode scrapes into a throwaway dir with no previous payload,
          # so every source is due — a true test of runner connectivity.
          LOCAL_STORE_DIR: ${{ inputs.probe && 'probe-out' || 'docs' }}
        run: python publish_static.py

      - name: Commit updated feeds
        if: ${{ !inputs.probe }}
        run: |
          git config user.name "improv-feed-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/shows.json docs/classes.json docs/talent.json
          if git diff --cached --quiet; then
            echo "feeds unchanged — nothing to publish"
          else
            git commit -m "Update feeds"
            git push
          fi
