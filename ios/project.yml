# Fallback project generator (optional). If the committed UCBShows.xcodeproj ever
# gets out of sync, regenerate it with XcodeGen:
#
#   brew install xcodegen && cd ios && xcodegen generate
#
name: UCBShows
options:
  bundleIdPrefix: com.salimhafid
  deploymentTarget:
    iOS: "18.6"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: 8FKP6A38FJ
targets:
  UCBShows:
    type: application
    platform: iOS
    sources:
      - UCBShows
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.salimhafid.UCBShows
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: true
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_CFBundleDisplayName: "Improv"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.entertainment"
        INFOPLIST_KEY_NSCalendarsWriteOnlyAccessUsageDescription: "Improv adds shows you're going to as events in your calendar."
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
