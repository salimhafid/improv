<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UCB New York — Upcoming Shows</title>
<style>
  :root {
    --bg: #0c0c0f;
    --surface: #16161c;
    --surface-2: #1e1e26;
    --border: #2a2a35;
    --text: #f4f4f6;
    --muted: #9a9aa7;
    --accent: #ffd200;
    --accent-ink: #1a1a1a;
    --live: #4fd1c5;
    --free: #9ae66e;
    --radius: 14px;
    --shadow: 0 6px 24px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 0 20px 80px; }

  header.site {
    position: sticky; top: 0; z-index: 50;
    background: rgba(12,12,15,.85);
    backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .site-inner {
    max-width: 1200px; margin: 0 auto; padding: 16px 20px;
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand .mark {
    font-weight: 800; letter-spacing: .5px; font-size: 20px;
    background: var(--accent); color: var(--accent-ink);
    padding: 3px 8px; border-radius: 7px;
  }
  .brand .name { font-weight: 700; font-size: 18px; }
  .brand .sub { color: var(--muted); font-size: 14px; }
  .meta { margin-left: auto; text-align: right; color: var(--muted); font-size: 13px; line-height: 1.35; }
  .meta strong { color: var(--text); }
  .stale { color: #ffb4b4; }

  .toolbar {
    display: grid;
    grid-template-columns: 1.6fr 1fr 1fr 1fr auto;
    gap: 10px; margin: 22px 0 8px;
  }
  @media (max-width: 820px) { .toolbar { grid-template-columns: 1fr 1fr; } }
  .toolbar input[type=search], .toolbar select {
    width: 100%; padding: 10px 12px; color: var(--text);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; font-size: 14px; appearance: none;
  }
  .toolbar input::placeholder { color: var(--muted); }
  .toolbar select:focus, .toolbar input:focus { outline: 2px solid var(--accent); outline-offset: 0; }
  .chk { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 14px;
         background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0 12px; }
  .chk input { accent-color: var(--accent); width: 16px; height: 16px; }
  .countline { color: var(--muted); font-size: 13px; margin: 6px 2px 24px; }
  .countline b { color: var(--text); }
  .reset { background: transparent; border: 1px solid var(--border); color: var(--muted);
           border-radius: 8px; padding: 2px 8px; cursor: pointer; font-size: 12px; margin-left: 8px; }
  .reset:hover { color: var(--text); border-color: var(--muted); }

  .daygroup { margin-bottom: 34px; }
  .dayhead {
    font-size: 13px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase;
    color: var(--accent); padding-bottom: 10px; margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column;
    transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
  }
  .card:hover { transform: translateY(-3px); border-color: #3a3a48; box-shadow: var(--shadow); }
  .thumb { aspect-ratio: 2 / 1; background: var(--surface-2) center/cover no-repeat; display: block; }
  .card-body { padding: 14px 15px 16px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .when { font-size: 12px; font-weight: 600; color: var(--muted); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .when .time { color: var(--text); }
  .title { font-size: 16.5px; font-weight: 700; line-height: 1.25; margin: 0; }
  .title a { text-decoration: none; }
  .title a:hover { color: var(--accent); }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px;
           background: var(--surface-2); color: var(--muted); border: 1px solid var(--border); }
  .badge.live { color: var(--live); border-color: rgba(79,209,197,.4); }
  .badge.free { color: var(--free); border-color: rgba(154,230,110,.4); }
  .venue { font-size: 12.5px; color: var(--muted); }
  .venue::before { content: "📍 "; }
  .excerpt { font-size: 13px; color: var(--muted); display: -webkit-box; -webkit-line-clamp: 3;
             -webkit-box-orient: vertical; overflow: hidden; }
  .cta { margin-top: auto; }
  .cta a {
    display: inline-block; text-decoration: none; font-weight: 700; font-size: 13.5px;
    background: var(--accent); color: var(--accent-ink); padding: 9px 14px; border-radius: 9px;
  }
  .cta a:hover { filter: brightness(1.05); }

  .empty { text-align: center; color: var(--muted); padding: 70px 20px; }
  .empty h2 { color: var(--text); font-weight: 700; }
  footer { color: var(--muted); font-size: 12.5px; text-align: center; padding: 30px 0 0; }
  footer a { color: var(--accent); }
</style>
</head>
<body>
  <header class="site">
    <div class="site-inner">
      <div class="brand">
        <span class="mark">UCB</span>
        <span class="name">New York</span>
        <span class="sub">Upcoming Shows</span>
      </div>
      <div class="meta" id="meta"></div>
    </div>
  </header>

  <div class="wrap">
    <div class="toolbar">
      <input type="search" id="q" placeholder="Search shows…" autocomplete="off" />
      <select id="venue"><option value="">All venues</option></select>
      <select id="type"><option value="">All types</option></select>
      <select id="date">
        <option value="all">Any date</option>
        <option value="week">Next 7 days</option>
        <option value="month">Next 31 days</option>
      </select>
      <label class="chk"><input type="checkbox" id="live" /> Livestream</label>
    </div>
    <div class="countline" id="countline"></div>
    <main id="results"></main>
    <footer>
      Data scraped{% if hourly %} hourly{% endif %} from
      <a href="https://ucbcomedy.com/shows/new-york/" target="_blank" rel="noopener">ucbcomedy.com</a>.
      Not affiliated with UCB.
    </footer>
  </div>

<script>
  const DATA = {{ payload | tojson }};
  const SHOWS = DATA.shows || [];

  // ---- helpers ----------------------------------------------------------
  function parseShowDate(iso) {
    if (!iso) return null;
    // date-only strings -> anchor at local midday so grouping doesn't shift a day
    const s = iso.length === 10 ? iso + "T12:00:00" : iso;
    const d = new Date(s);
    return isNaN(d) ? null : d;
  }
  const MONTHS = ["January","February","March","April","May","June","July",
                  "August","September","October","November","December"];
  const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  function groupLabel(d) {
    const now = new Date();
    let label = `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`;
    if (d.getFullYear() !== now.getFullYear()) label += `, ${d.getFullYear()}`;
    return label;
  }
  function timeLabel(show) {
    const m = (show.date_raw || "").match(/(\d{1,2}:\d{2}\s*[AaPp][Mm])/);
    if (m) return m[1].toUpperCase().replace(/\s+/, " ");
    if (show.end && show.end !== show.start) return "Multiple days";
    return "Time TBA";
  }
  function relTime(iso) {
    if (!iso) return "unknown";
    const then = new Date(iso), now = new Date();
    const mins = Math.round((now - then) / 60000);
    if (mins < 1) return "just now";
    if (mins < 60) return `${mins} min ago`;
    const hrs = Math.round(mins / 60);
    if (hrs < 24) return `${hrs} hr${hrs > 1 ? "s" : ""} ago`;
    return `${Math.round(hrs / 24)} day(s) ago`;
  }
  function esc(s) {
    return (s || "").replace(/[&<>"']/g, c => (
      {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }
  // Allow only http(s) URLs into href/CSS; neutralizes javascript:/data: from
  // the scraped third-party data (defense in depth alongside server-side check).
  function safeUrl(u) {
    try {
      const p = new URL(u, location.href);
      return (p.protocol === "https:" || p.protocol === "http:") ? u : "#";
    } catch { return "#"; }
  }
  // Local-date key (YYYY-MM-DD) from the SAME components groupLabel() uses, so a
  // group's key and header can never disagree across timezones.
  function localKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-`
         + `${String(d.getDate()).padStart(2, "0")}`;
  }

  // ---- meta / staleness -------------------------------------------------
  (function renderMeta() {
    const el = document.getElementById("meta");
    const g = DATA.generated_at;
    let stale = "";
    if (g) {
      const ageMin = (Date.now() - new Date(g)) / 60000;
      if (ageMin > 90) stale = ' <span class="stale">· data may be stale</span>';
    }
    el.innerHTML = `<strong>${DATA.count || 0}</strong> upcoming shows`
      + `<br>Updated ${g ? esc(relTime(g)) : "—"}${stale}`;
  })();

  // ---- filter option lists ---------------------------------------------
  (function populateFilters() {
    const venues = new Set(), types = new Set();
    for (const s of SHOWS) {
      if (s.venue) venues.add(s.venue);
      (s.comedy_types || []).forEach(t => t && types.add(t));
    }
    const vsel = document.getElementById("venue"), tsel = document.getElementById("type");
    [...venues].sort().forEach(v => vsel.add(new Option(v, v)));
    [...types].sort().forEach(t => tsel.add(new Option(t, t)));
  })();

  // ---- filtering + rendering -------------------------------------------
  const els = {
    q: document.getElementById("q"),
    venue: document.getElementById("venue"),
    type: document.getElementById("type"),
    date: document.getElementById("date"),
    live: document.getElementById("live"),
    results: document.getElementById("results"),
    countline: document.getElementById("countline"),
  };

  function withinDateWindow(show, mode) {
    if (mode === "all") return true;
    const d = parseShowDate(show.start || show.end);
    if (!d) return false;
    const start = new Date(); start.setHours(0, 0, 0, 0);
    const end = new Date(start);
    end.setDate(end.getDate() + (mode === "week" ? 7 : 31));
    return d >= start && d <= end;
  }

  function matches(show) {
    const q = els.q.value.trim().toLowerCase();
    if (q) {
      const hay = `${show.title} ${show.excerpt} ${(show.comedy_types||[]).join(" ")} ${show.venue}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (els.venue.value && show.venue !== els.venue.value) return false;
    if (els.type.value && !(show.comedy_types || []).includes(els.type.value)) return false;
    if (els.live.checked && !show.is_livestream) return false;
    if (!withinDateWindow(show, els.date.value)) return false;
    return true;
  }

  function cardHTML(s) {
    const href = esc(safeUrl(s.url));
    const imgUrl = s.image ? esc(safeUrl(s.image)) : "";
    const img = imgUrl
      ? `<a class="thumb" href="${href}" target="_blank" rel="noopener" style="background-image:url('${imgUrl}')"></a>`
      : `<a class="thumb" href="${href}" target="_blank" rel="noopener"></a>`;
    const badges = [
      ...(s.comedy_types || []).map(t => `<span class="badge">${esc(t)}</span>`),
      s.is_livestream ? `<span class="badge live">Livestream</span>` : "",
      s.is_free ? `<span class="badge free">Free</span>` : "",
    ].join("");
    return `<article class="card">
      ${img}
      <div class="card-body">
        <div class="when"><span class="time">${esc(timeLabel(s))}</span></div>
        <h3 class="title"><a href="${href}" target="_blank" rel="noopener">${esc(s.title)}</a></h3>
        <div class="badges">${badges}</div>
        ${s.venue ? `<div class="venue">${esc(s.venue)}</div>` : ""}
        ${s.excerpt ? `<div class="excerpt">${esc(s.excerpt)}</div>` : ""}
        <div class="cta"><a href="${href}" target="_blank" rel="noopener">Get Tickets →</a></div>
      </div>
    </article>`;
  }

  function render() {
    const shown = SHOWS.filter(matches);

    // group by calendar day
    const groups = new Map();
    for (const s of shown) {
      const d = parseShowDate(s.start || s.end);
      const key = d ? localKey(d) : "tba";
      if (!groups.has(key)) groups.set(key, { date: d, items: [] });
      groups.get(key).items.push(s);
    }
    const keys = [...groups.keys()].sort((a, b) => (a === "tba") - (b === "tba") || a.localeCompare(b));

    if (!shown.length) {
      els.results.innerHTML =
        `<div class="empty"><h2>No shows match your filters</h2><p>Try clearing search or filters.</p></div>`;
    } else {
      els.results.innerHTML = keys.map(k => {
        const g = groups.get(k);
        const head = g.date ? groupLabel(g.date) : "Dates to be announced";
        return `<section class="daygroup">
          <div class="dayhead">${esc(head)}</div>
          <div class="grid">${g.items.map(cardHTML).join("")}</div>
        </section>`;
      }).join("");
    }

    const anyFilter = els.q.value || els.venue.value || els.type.value ||
                      els.date.value !== "all" || els.live.checked;
    els.countline.innerHTML = `Showing <b>${shown.length}</b> of <b>${SHOWS.length}</b> shows`
      + (anyFilter ? ` <button class="reset" id="reset">clear filters</button>` : "");
    const rb = document.getElementById("reset");
    if (rb) rb.onclick = () => {
      els.q.value = ""; els.venue.value = ""; els.type.value = "";
      els.date.value = "all"; els.live.checked = false; render();
    };
  }

  ["input", "change"].forEach(ev => {
    els.q.addEventListener(ev, render);
    [els.venue, els.type, els.date, els.live].forEach(e => e.addEventListener(ev, render));
  });
  render();
</script>
</body>
</html>
